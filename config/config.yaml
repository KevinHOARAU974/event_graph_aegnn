seed: 12345
project_name: 'aegnn'

model: "graph_res"
dataset: "ncars"
task: "recognition"

data_params: 
  batch_size: 16 # set to 16 in the article
  num_workers: 8
  pin_memory: True
  shuffle: True

model_params:
  lr: 0.001
  weight_decay: 0.00005
  eta_min: 0.0
  dim: 3
  label_smoothing: 0.1

trainer:
  max_epochs: 30
  overfit_batches: 0
  log_every_n_steps: 1
  gradient_clip_val: 0

callback_params:
  patience: 30
  

log_gradients: True
profile: True
debug: True

log_dir: "training_log_aegnn/"
data_dir: "/home/ibrahim/event_graph_aegnn/test_codes/data"
